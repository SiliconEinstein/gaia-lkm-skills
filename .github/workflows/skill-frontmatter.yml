name: skill-frontmatter

on:
  pull_request:
    paths:
      - "skills/**/SKILL.md"
      - "scripts/check_skill_frontmatter.py"
      - "tests/test_check_skill_frontmatter.py"
      - ".github/workflows/skill-frontmatter.yml"
  push:
    branches: [main]
    paths:
      - "skills/**/SKILL.md"
      - "scripts/check_skill_frontmatter.py"
      - "tests/test_check_skill_frontmatter.py"
      - ".github/workflows/skill-frontmatter.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill frontmatter
        run: python scripts/check_skill_frontmatter.py

      - name: Run frontmatter checker unit tests
        run: python tests/test_check_skill_frontmatter.py
